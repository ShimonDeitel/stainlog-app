name: Stainlog
options:
  bundleIdPrefix: com.shimondeitel.stainlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stainlog:
    type: application
    platform: iOS
    sources:
      - path: Stainlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stainlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stainlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StainlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StainlogTests
      - path: Stainlog.storekit
    dependencies:
      - target: Stainlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stainlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StainlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StainlogUITests
    dependencies:
      - target: Stainlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stainlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stainlog:
    build:
      targets:
        Stainlog: all
        StainlogTests: [test]
        StainlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stainlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Stainlog.storekit
      targets:
        - StainlogTests
        - StainlogUITests
    archive:
      config: Release
